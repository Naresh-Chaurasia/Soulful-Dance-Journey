name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Cache Antora dependencies
        uses: actions/cache@v3
        with:
          path: .antora
          key: ${{ runner.os }}-antora-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-antora-${{ hashFiles('**/package-lock.json') }}

      - name: Install Antora dependencies
        run: |
          gem install asciidoctor
          npm install

      - name: Generate site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/site